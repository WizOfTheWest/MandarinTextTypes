<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chinese Text Types Reference</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f4f1eb;
            --paper-color: #fffdf8;
            --ink-black: #1a1a1a;
            --ink-light: #4a4a4a;
            --vermilion: #c23a22;
            --border-color: #d1cbb8;
            --line-height: 36px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Playfair Display', serif;
            background-color: var(--bg-color);
            color: var(--ink-black);
            height: 100vh;
            display: flex;
            overflow: hidden;
            background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100' height='100' filter='url(%23noise)' opacity='0.05'/%3E%3C/svg%3E");
        }

        /* Sidebar Layout */
        .sidebar {
            width: 350px;
            background-color: var(--bg-color);
            border-right: 2px solid var(--ink-black);
            display: flex;
            flex-direction: column;
            z-index: 10;
            box-shadow: 5px 0 15px rgba(0,0,0,0.03);
        }

        .header {
            padding: 2rem;
            border-bottom: 2px solid var(--ink-black);
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
        }

        .header p {
            font-family: 'Noto Serif SC', serif;
            font-size: 1.2rem;
            color: var(--vermilion);
        }

        .search-container {
            padding: 1.5rem;
            border-bottom: 1px solid var(--border-color);
        }

        .search-box {
            width: 100%;
            padding: 0.75rem 1rem;
            font-family: inherit;
            font-size: 1rem;
            background: transparent;
            border: 1px solid var(--ink-light);
            border-radius: 0;
            color: var(--ink-black);
            transition: all 0.3s ease;
        }

        .search-box:focus {
            outline: none;
            border-color: var(--vermilion);
            box-shadow: 4px 4px 0px var(--vermilion);
        }

        .nav-list {
            flex-grow: 1;
            overflow-y: auto;
            list-style: none;
        }

        .nav-item {
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .nav-item:hover {
            background-color: rgba(194, 58, 34, 0.05);
            padding-left: 2rem;
        }

        .nav-item.active {
            background-color: var(--ink-black);
            color: var(--bg-color);
            border-color: var(--ink-black);
        }

        .nav-item.active .zh-title {
            color: var(--bg-color);
            opacity: 0.8;
        }

        .en-title {
            font-weight: 700;
            font-size: 1.1rem;
        }

        .zh-title {
            font-family: 'Noto Serif SC', serif;
            font-size: 0.9rem;
            color: var(--ink-light);
        }

        /* Main Content Area */
        .main-content {
            flex-grow: 1;
            padding: 3rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .manuscript-container {
            width: 100%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .content-header {
            border-bottom: 4px double var(--ink-black);
            padding-bottom: 1rem;
            margin-bottom: 1rem;
        }

        .content-title {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        .content-zh-title {
            font-family: 'Noto Serif SC', serif;
            color: var(--vermilion);
            font-size: 1.5rem;
        }

        .description {
            font-style: italic;
            color: var(--ink-light);
            line-height: 1.6;
            font-size: 1.1rem;
        }

        .section-label {
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.85rem;
            color: var(--vermilion);
            margin-bottom: 1rem;
            display: inline-block;
            border-bottom: 1px solid var(--vermilion);
            padding-bottom: 0.2rem;
        }

        /* Structure Layout */
        .structure-block {
            background-color: var(--paper-color);
            border: 1px solid var(--border-color);
            padding: 2rem;
            position: relative;
            box-shadow: 8px 8px 0px rgba(0,0,0,0.05);
        }

        .manuscript-paper {
            font-family: 'Noto Serif SC', serif;
            font-size: 1.2rem;
            line-height: var(--line-height);
            white-space: pre-wrap;
            color: var(--ink-black);
            /* Simulating lined paper */
            background: repeating-linear-gradient(
                transparent,
                transparent calc(var(--line-height) - 1px),
                var(--border-color) calc(var(--line-height) - 1px),
                var(--border-color) var(--line-height)
            );
            background-attachment: local;
        }

        /* Translation Styling */
        .translation {
            color: #888888;
            font-family: 'Playfair Display', serif;
            font-size: 0.85em;
            font-style: italic;
            margin-left: 0.5rem;
            user-select: none; /* Prevents selecting the translation when copying the Chinese text */
        }

        /* Keywords Layout */
        .keywords-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .keyword-tag {
            border: 1px solid var(--ink-black);
            padding: 0.5rem 1rem;
            font-family: 'Noto Serif SC', serif;
            font-size: 1.1rem;
            background: transparent;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .keyword-tag:hover {
            background: var(--ink-black);
            color: var(--bg-color);
        }

        .keyword-translation {
            font-family: 'Playfair Display', serif;
            font-size: 0.9rem;
            opacity: 0.7;
            font-style: italic;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-color);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--ink-light);
        }

    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="header">
            <h1>Text Types</h1>
            <p>写作格式指南</p>
        </div>
        <div class="search-container">
            <input type="text" id="searchInput" class="search-box" placeholder="Search structures (e.g., Email, 报告)...">
        </div>
        <ul class="nav-list" id="navList">
            </ul>
    </aside>

    <main class="main-content">
        <div class="manuscript-container">
            <div class="content-header">
                <h2 class="content-title" id="displayEnTitle">Select a Text Type</h2>
                <h3 class="content-zh-title" id="displayZhTitle">请选择文章类型</h3>
            </div>
            
            <p class="description" id="displayDesc">Use the search bar or the list on the left to explore formatting conventions.</p>

            <div id="contentBody" style="display: none; width: 100%; flex-direction: column; gap: 2rem;">
                <div>
                    <div class="section-label">Structural Layout</div>
                    <div class="structure-block">
                        <div class="manuscript-paper" id="displayStructure"></div>
                    </div>
                </div>

                <div>
                    <div class="section-label">Essential Keywords & Phrases</div>
                    <div class="keywords-grid" id="displayKeywords">
                        </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Data populated with inline HTML spans for greyed-out translations
        const textTypesData = [
            {
                id: 'letter',
                enTitle: 'Letter',
                zhTitle: '信',
                description: 'Informal correspondence focusing on individual experience. Usually expresses the wish to receive a reply in the closing paragraph.',
                structure: '亲爱的小明: <span class="translation">(Dear Xiaoming:)</span>\n\n你好! <span class="translation">(Hello!)</span>\n\n　　（正文：首行缩进两格）... <span class="translation">(Body: Indent first line by two spaces...)</span>\n\n希望早日收到你的回信。 <span class="translation">(Hope to receive your reply soon. - Closing paragraph)</span>\n\n祝 <span class="translation">(Wish)</span>\n好(/快乐/健康)! <span class="translation">(Well! / Happy! / Healthy!)</span>\n\n杰克 <span class="translation">([Sender Name])</span>\nxxxx年xx月xx日 <span class="translation">(Date: Year Month Day)</span>',
                keywords: [
                    { zh: '亲爱的...', en: 'Dear...' },
                    { zh: '回信', en: 'Reply' },
                    { zh: '祝好 / 健康！', en: 'Wish you well / health!' }
                ]
            },
            {
                id: 'email',
                enTitle: 'Email',
                zhTitle: '电子邮件',
                description: 'Electronic correspondence that requires specific headers including sender, recipient, subject, and date.',
                structure: '寄件人: 汪小春@hotmail.com <span class="translation">(Sender:...)</span>\n收件人: 李大伟@gmail.com <span class="translation">(Recipient:...)</span>\n主题: 话剧《西游记》 <span class="translation">(Subject: Drama "Journey to the West")</span>\n日期: 二零一二年九月十日 <span class="translation">(Date: September 10, 2012)</span>\n\n亲爱的大伟: <span class="translation">(Dear Dawei:)</span>\n\n你最近好吗? <span class="translation">(How have you been recently?)</span>\n\n　　（正文）... <span class="translation">(Body...)</span>\n\n希望你能来! <span class="translation">(Hope you can come!)</span>\n\n汪小春 <span class="translation">([Sender Name])</span>',
                keywords: [
                    { zh: '寄件人 / 收件人', en: 'Sender / Recipient' },
                    { zh: '主题 / 日期', en: 'Subject / Date' },
                    { zh: '你最近好吗？', en: 'How have you been recently?' }
                ]
            },
            {
                id: 'diary',
                enTitle: 'Diary Entry',
                zhTitle: '日记',
                description: 'A deeply personal text recounting daily events. The top line must include the date, day of the week, and weather.',
                structure: '十一月二十七日  星期三  晴 <span class="translation">(November 27th | Wednesday | Sunny)</span>\n\n　　今天是我的生日... <span class="translation">(Today is my birthday... - Indent first line by two spaces, use first-person)</span>\n　　...',
                keywords: [
                    { zh: '晴 / 阴 / 雨', en: 'Sunny / Overcast / Rain (Weather)' },
                    { zh: '星期...', en: 'Day of the week' },
                    { zh: '今天', en: 'Today' }
                ]
            },
            {
                id: 'essay',
                enTitle: 'Essay',
                zhTitle: '文章',
                description: 'Standard multi-paragraph text focusing on informing or describing a subject, such as a person or an event.',
                structure: '（标题 - 可选）我的妈妈 <span class="translation">(Title - Optional: My Mother)</span>\n\n　　我的妈妈叫玛丽,她今年四十五岁。她长得很漂亮... <span class="translation">(My mother is named Mary, she is 45 years old. She is very beautiful... - Introduction)</span>\n\n　　妈妈最近喜欢写博客... <span class="translation">(Mother recently likes writing a blog... - Body paragraph 1)</span>\n\n　　妈妈是个很热情的人... <span class="translation">(Mother is a very enthusiastic person... - Body paragraph 2)</span>\n\n　　我爱我的妈妈,我觉得她是个很不错的人。 <span class="translation">(I love my mother, I think she is a very nice person. - Conclusion)</span>',
                keywords: [
                    { zh: '最近', en: 'Recently' },
                    { zh: '我觉得', en: 'I think / I feel' },
                    { zh: '因为', en: 'Because' }
                ]
            },
            {
                id: 'speech',
                enTitle: 'Speech',
                zhTitle: '演讲稿',
                description: 'Persuasive text relying on a clear opening greeting to the audience and a concluding thank-you.',
                structure: '老师们、同学们: <span class="translation">(Teachers, Students:)</span>\n大家好! <span class="translation">(Hello everyone!)</span>\n\n　　我们在日常生活中就可以... <span class="translation">(In our daily lives we can... - Arguments/Points)</span>\n\n　　同学们,如果我们现在不... <span class="translation">(Students, if we do not currently... - Call to Action)</span>\n谢谢大家! <span class="translation">(Thank you all!)</span>',
                keywords: [
                    { zh: '老师们、同学们...', en: 'Teachers, Students...' },
                    { zh: '大家好！', en: 'Hello everyone!' },
                    { zh: '谢谢大家！', en: 'Thank you all!' }
                ]
            },
            {
                id: 'report',
                enTitle: 'Report',
                zhTitle: '报告',
                description: 'A formal text addressed to an authority figure, stating a clear situation or problem. Must include contact information if requesting a follow-up.',
                structure: '尊敬的警察先生: <span class="translation">(Respected Mr. Policeman:)</span>\n\n　　我是一个到苏州来旅游的英国人... <span class="translation">(I am a British tourist in Suzhou... - State facts clearly)</span>\n\n　　如果有人捡到,请联系我。我的电话是... 非常感谢! <span class="translation">(If anyone finds it, please contact me. My phone number is... Thank you very much!)</span>\n\nJames Thomas <span class="translation">([Your Name])</span>\n四月二十日 <span class="translation">([Date])</span>',
                keywords: [
                    { zh: '尊敬的...', en: 'Respected...' },
                    { zh: '请联系我', en: 'Please contact me' },
                    { zh: '非常感谢', en: 'Thank you very much' }
                ]
            },
            {
                id: 'note',
                enTitle: 'Note',
                zhTitle: '便条',
                description: 'Used for brief communicative acts. Structure is minimal, requiring only the recipient, core message, sender, and date.',
                structure: '李老师: <span class="translation">(Teacher Li:)</span>\n\n　　你好!今天下午... <span class="translation">(Hello! This afternoon... - Core message)</span>\n\n王太太 <span class="translation">(Mrs. Wang - Sender)</span>\n七月二十六日 <span class="translation">(July 26th - Date)</span>',
                keywords: [
                    { zh: '你好！', en: 'Hello!' },
                    { zh: '请假', en: 'Ask for leave' },
                    { zh: '谢谢！', en: 'Thank you!' }
                ]
            },
            {
                id: 'announcement',
                enTitle: 'Announcement',
                zhTitle: '通知',
                description: 'Used to inform a group about an event or policy. Must include specific details like time, location, participants, and fees.',
                structure: '（标题：居中）书法班招生 <span class="translation">(Title: Calligraphy Class Enrollment)</span>\n\n　　为了让同学们学习中国字... <span class="translation">(In order to let students learn Chinese characters... - Purpose)</span>\n\n活动时间: 每周三下午三点半 <span class="translation">(Activity Time: Every Wednesday 3:30 PM)</span>\n活动地点: 中文教室 <span class="translation">(Activity Location: Chinese Classroom)</span>\n参加学生: 六到十年级学生 <span class="translation">(Participants: Grade 6 to 10 students)</span>\n费用: 一百元 <span class="translation">(Fee: 100 Yuan)</span>\n\n有兴趣的同学,请找王老师报名。 <span class="translation">(Interested students, please contact Teacher Wang to register.)</span>\n\n中文办公室 <span class="translation">(Chinese Office - Organizer)</span>\n八月二十八日 <span class="translation">(August 28th - Date)</span>',
                keywords: [
                    { zh: '活动时间 / 地点', en: 'Activity Time / Location' },
                    { zh: '报名', en: 'Sign up / Register' },
                    { zh: '费用', en: 'Fee / Cost' }
                ]
            },
            {
                id: 'poster',
                enTitle: 'Poster',
                zhTitle: '海报',
                description: 'Visually engaging format used for public education or promotion. Uses bullet points and impactful headings.',
                structure: '（大标题）怎样爱护牙齿: <span class="translation">(Headline: How to care for your teeth:)</span>\n\n爱护牙齿,从今天做起 <span class="translation">(Care for your teeth, starting today - Subtitle/Slogan)</span>\n\n★ 少吃零食,如:蛋糕、巧克力等 <span class="translation">(★ Eat fewer snacks, such as: cakes, chocolates, etc.)</span>\n★ 早晚刷牙 <span class="translation">(★ Brush teeth morning and night)</span>\n★ 注意饮食 <span class="translation">(★ Pay attention to diet)</span>\n★ 每年都去看牙医 <span class="translation">(★ Go to the dentist every year)</span>\n\n口腔健康教育热线 44559291 <span class="translation">(Oral Health Education Hotline: 44559291 - Contact info)</span>',
                keywords: [
                    { zh: '★', en: 'Bullet points' },
                    { zh: '从今天做起', en: 'Starting today' },
                    { zh: '热线', en: 'Hotline' }
                ]
            },
            {
                id: 'advertisement',
                enTitle: 'Advertisement',
                zhTitle: '广告',
                description: 'Used to sell goods or services. Highlights the items, prices, and contact information clearly.',
                structure: '（标题）二手书广告 <span class="translation">(Title: Second-hand Book Advertisement)</span>\n\n　　我有很多中文书,包括小说、杂志... <span class="translation">(I have many Chinese books, including novels, magazines... - Description of items)</span>\n　　现在我要搬家了,每件二手物品都卖三元。 <span class="translation">(Now I am moving, every second-hand item is sold for three yuan. - Reason and Price)</span>\n　　如果你有兴趣,可以和我联系。 <span class="translation">(If you are interested, you can contact me. - Call to action)</span>\n\n联系人: 李小明 <span class="translation">(Contact Person: Li Xiaoming)</span>\n电话: 45889034 <span class="translation">(Phone: 45889034)</span>',
                keywords: [
                    { zh: '二手', en: 'Second-hand' },
                    { zh: '有兴趣', en: 'Interested' },
                    { zh: '联系人 / 电话', en: 'Contact Person / Phone' }
                ]
            },
            {
                id: 'postcard',
                enTitle: 'Postcard',
                zhTitle: '明信片',
                description: 'A condensed informal letter focusing on a single location/event. Layout requires a simulated address block with zip codes and recipient/sender markers like (收) and (寄).',
                structure: '小花: <span class="translation">(Xiaohua: - Recipient)</span>\n\n你好!我们一家现在在海南度假... <span class="translation">(Hello! Our family is vacationing in Hainan...)</span>\n希望早日见到你。 <span class="translation">(Hope to see you soon.)</span>\n\n小明 <span class="translation">(Xiaoming)</span>\n八月五日 <span class="translation">(August 5th)</span>\n\n                          100039 <span class="translation">([Recipient Zip Code])</span>\n                          北京太平路二十二号三号楼三零三室 <span class="translation">([Recipient Address])</span>\n                          李小花 (收) <span class="translation">(Li Xiaohua [To Receive])</span>\n\n                          海南 王小明 (寄) <span class="translation">(Hainan, Wang Xiaoming [Sender])</span>\n                          570001 <span class="translation">([Sender Zip Code])</span>',
                keywords: [
                    { zh: '(收) / (寄)', en: '(Receive) / (Send)' },
                    { zh: '度假', en: 'Vacation' },
                    { zh: '希望早日见到你', en: 'Hope to see you soon' }
                ]
            }
        ];

        const searchInput = document.getElementById('searchInput');
        const navList = document.getElementById('navList');
        const contentBody = document.getElementById('contentBody');
        const displayEnTitle = document.getElementById('displayEnTitle');
        const displayZhTitle = document.getElementById('displayZhTitle');
        const displayDesc = document.getElementById('displayDesc');
        const displayStructure = document.getElementById('displayStructure');
        const displayKeywords = document.getElementById('displayKeywords');

        function renderList(filter = '') {
            navList.innerHTML = '';
            const lowerFilter = filter.toLowerCase();
            
            textTypesData.forEach((item, index) => {
                if (item.enTitle.toLowerCase().includes(lowerFilter) || 
                    item.zhTitle.includes(lowerFilter)) {
                    
                    const li = document.createElement('li');
                    li.className = 'nav-item';
                    li.innerHTML = `
                        <span class="en-title">${item.enTitle}</span>
                        <span class="zh-title">${item.zhTitle}</span>
                    `;
                    
                    li.addEventListener('click', () => {
                        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
                        li.classList.add('active');
                        loadContent(item);
                    });

                    navList.appendChild(li);

                    // Auto-load first item on initial render
                    if (index === 0 && filter === '') {
                        li.click();
                    }
                }
            });
        }

        function loadContent(data) {
            contentBody.style.display = 'flex';
            displayEnTitle.textContent = data.enTitle;
            displayZhTitle.textContent = data.zhTitle;
            displayDesc.textContent = data.description;
            
            // Changed from textContent to innerHTML so the <span> tags render correctly
            displayStructure.innerHTML = data.structure;
            
            displayKeywords.innerHTML = data.keywords.map(kw => `
                <div class="keyword-tag">
                    <span>${kw.zh}</span>
                    <span class="keyword-translation">${kw.en}</span>
                </div>
            `).join('');
        }

        searchInput.addEventListener('input', (e) => {
            renderList(e.target.value);
        });

        // Initialize
        renderList();
    </script>
</body>
</html>
