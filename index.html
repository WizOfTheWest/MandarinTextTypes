<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chinese Text Types Reference</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f4f1eb;
            --paper-color: #fffdf8;
            --ink-black: #1a1a1a;
            --ink-light: #4a4a4a;
            --vermilion: #c23a22;
            --border-color: #d1cbb8;
            --line-height: 36px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Playfair Display', serif;
            background-color: var(--bg-color);
            color: var(--ink-black);
            height: 100vh;
            display: flex;
            overflow: hidden;
            background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100' height='100' filter='url(%23noise)' opacity='0.05'/%3E%3C/svg%3E");
        }

        /* Sidebar Layout */
        .sidebar {
            width: 350px;
            background-color: var(--bg-color);
            border-right: 2px solid var(--ink-black);
            display: flex;
            flex-direction: column;
            z-index: 10;
            box-shadow: 5px 0 15px rgba(0,0,0,0.03);
        }

        .header {
            padding: 2rem;
            border-bottom: 2px solid var(--ink-black);
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
        }

        .header p {
            font-family: 'Noto Serif SC', serif;
            font-size: 1.2rem;
            color: var(--vermilion);
        }

        .search-container {
            padding: 1.5rem;
            border-bottom: 1px solid var(--border-color);
        }

        .search-box {
            width: 100%;
            padding: 0.75rem 1rem;
            font-family: inherit;
            font-size: 1rem;
            background: transparent;
            border: 1px solid var(--ink-light);
            border-radius: 0;
            color: var(--ink-black);
            transition: all 0.3s ease;
        }

        .search-box:focus {
            outline: none;
            border-color: var(--vermilion);
            box-shadow: 4px 4px 0px var(--vermilion);
        }

        .nav-list {
            flex-grow: 1;
            overflow-y: auto;
            list-style: none;
        }

        .nav-item {
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .nav-item:hover {
            background-color: rgba(194, 58, 34, 0.05);
            padding-left: 2rem;
        }

        .nav-item.active {
            background-color: var(--ink-black);
            color: var(--bg-color);
            border-color: var(--ink-black);
        }

        .nav-item.active .zh-title {
            color: var(--bg-color);
            opacity: 0.8;
        }

        .en-title {
            font-weight: 700;
            font-size: 1.1rem;
        }

        .zh-title {
            font-family: 'Noto Serif SC', serif;
            font-size: 0.9rem;
            color: var(--ink-light);
        }

        /* Main Content Area */
        .main-content {
            flex-grow: 1;
            padding: 3rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .manuscript-container {
            width: 100%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .content-header {
            border-bottom: 4px double var(--ink-black);
            padding-bottom: 1rem;
            margin-bottom: 1rem;
        }

        .content-title {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        .content-zh-title {
            font-family: 'Noto Serif SC', serif;
            color: var(--vermilion);
            font-size: 1.5rem;
        }

        .description {
            font-style: italic;
            color: var(--ink-light);
            line-height: 1.6;
            font-size: 1.1rem;
        }

        .section-label {
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.85rem;
            color: var(--vermilion);
            margin-bottom: 1rem;
            display: inline-block;
            border-bottom: 1px solid var(--vermilion);
            padding-bottom: 0.2rem;
        }

        /* Structure Layout */
        .structure-block {
            background-color: var(--paper-color);
            border: 1px solid var(--border-color);
            padding: 2rem;
            position: relative;
            box-shadow: 8px 8px 0px rgba(0,0,0,0.05);
        }

        .manuscript-paper {
            font-family: 'Noto Serif SC', serif;
            font-size: 1.2rem;
            color: var(--ink-black);
        }

        .paper-line {
            min-height: var(--line-height);
            border-bottom: 1px solid var(--border-color);
            line-height: var(--line-height);
            padding-bottom: 2px;
            word-break: break-word;
        }

        /* Translation Styling */
        .translation {
            color: #888888;
            font-family: 'Playfair Display', serif;
            font-size: 0.85em;
            font-style: italic;
            margin-left: 0.5rem;
            user-select: none;
        }

        /* Keywords Layout */
        .keywords-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .keyword-tag {
            border: 1px solid var(--ink-black);
            padding: 0.5rem 1rem;
            font-family: 'Noto Serif SC', serif;
            font-size: 1.1rem;
            background: transparent;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .keyword-tag:hover {
            background: var(--ink-black);
            color: var(--bg-color);
        }

        .keyword-translation {
            font-family: 'Playfair Display', serif;
            font-size: 0.9rem;
            opacity: 0.7;
            font-style: italic;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-color);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--ink-light);
        }

    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="header">
            <h1>Text Types</h1>
            <p>写作格式指南</p>
        </div>
        <div class="search-container">
            <input type="text" id="searchInput" class="search-box" placeholder="Search structures...">
        </div>
        <ul class="nav-list" id="navList">
            </ul>
    </aside>

    <main class="main-content">
        <div class="manuscript-container">
            <div class="content-header">
                <h2 class="content-title" id="displayEnTitle">Select a Text Type</h2>
                <h3 class="content-zh-title" id="displayZhTitle">请选择文章类型</h3>
            </div>
            
            <p class="description" id="displayDesc">Use the search bar or the list on the left to explore formatting conventions.</p>

            <div id="contentBody" style="display: none; width: 100%; flex-direction: column; gap: 2rem;">
                <div>
                    <div class="section-label">Structural Layout</div>
                    <div class="structure-block">
                        <div class="manuscript-paper" id="displayStructure"></div>
                    </div>
                </div>

                <div>
                    <div class="section-label">Essential Formatting Notes</div>
                    <div class="keywords-grid" id="displayKeywords">
                        </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const textTypesData = [
        {
        id: 'diary',
        enTitle: 'Diary',
        zhTitle: '日记',
        description: 'A personal record of daily events. The date, day of the week, and weather are placed on the first line. Body paragraphs are indented.',
        structure: 'X月X日 &nbsp;&nbsp;&nbsp;&nbsp; 星期X &nbsp;&nbsp;&nbsp;&nbsp; 天气 <span class="translation">(Date &nbsp; Day &nbsp; Weather - top line)</span>\n\n　　正文内容... <span class="translation">(Body paragraph - indented)</span>\n　　更多正文... <span class="translation">(More body text - indented)</span>',
        keywords: [
            { zh: '日期/星期/天气', en: 'Date/Day/Weather at top' },
            { zh: '正文缩进', en: 'Body indented' }
        ]
    },
    {
        id: 'email',
        enTitle: 'Email',
        zhTitle: '电邮',
        description: 'Electronic correspondence. Unlike most formats, the name sign-off remains left aligned.',
        structure: '收件人: ... <span class="translation">(To:)</span>\n发件人: ... <span class="translation">(From:)</span>\n主题: ... <span class="translation">(Subject:)</span>\n日期: ... <span class="translation">(Date:)</span>\n\n称呼: <span class="translation">(Greeting:)</span>\n\n　　正文 <span class="translation">(Body - indented)</span>\n\n祝好！ <span class="translation">(Wishes)</span>\n\n姓名 <span class="translation">(Name - left aligned)</span>',
        keywords: [
            { zh: '正文缩进', en: 'Body indented' },
            { zh: '姓名靠左', en: 'Name left aligned' }
        ]
    },
    {
        id: 'notice',
        enTitle: 'Notice',
        zhTitle: '通知',
        description: 'Used to inform a group. Specific event details are indented, while the issuer and date are right aligned.',
        structure: '<div style="text-align: center; font-weight: bold;">通知 <span class="translation">(Title)</span></div>\n　　正文内容... <span class="translation">(Body paragraph - indented)</span>\n\n　　活动时间: ... <span class="translation">(Time - indented)</span>\n　　地点: ... <span class="translation">(Location - indented)</span>\n　　费用: ... <span class="translation">(Fee - indented)</span>\n　　报名方式: ... <span class="translation">(Registration - indented)</span>\n\n<div style="text-align: right;">校办公室 / 名字 <span class="translation">(Office/Name - right aligned)</span></div>\n<div style="text-align: right;">X年X月X日 <span class="translation">(Date - right aligned)</span></div>',
        keywords: [
            { zh: '细节缩进', en: 'Details indented' },
            { zh: '落款靠右', en: 'Sign-off right aligned' }
        ]
    },
    {
        id: 'broadcast',
        enTitle: 'Broadcast',
        zhTitle: '广播',
        description: 'Script for an audio announcement. Contact details at the end must be right aligned.',
        structure: '各位听众：\n\n　　大家好！今天广播的内容是... <span class="translation">(Body paragraph - indented)</span>\n\n<div style="text-align: right;">联系人: ... <span class="translation">(Contact - right aligned)</span></div>\n<div style="text-align: right;">电话: ... <span class="translation">(Phone - right aligned)</span></div>',
        keywords: [
            { zh: '段落缩进', en: 'Paragraphs indented' },
            { zh: '联系信息靠右', en: 'Contact info right aligned' }
        ]
    },
    {
        id: 'letter',
        enTitle: 'Letter',
        zhTitle: '信',
        description: 'Standard informal correspondence. Greetings and wishes are indented; sign-off and date are right aligned.',
        structure: '称呼:\n\n　　问候！ <span class="translation">(Greeting - indented)</span>\n\n　　正文内容... <span class="translation">(Body paragraph - indented)</span>\n\n　　祝愿 <span class="translation">(Wishes - indented)</span>\n\n　　祝 <span class="translation">(Wish - indented)</span>\n好！\n\n<div style="text-align: right;">老王 / 名字 <span class="translation">(Name - right aligned)</span></div>\n<div style="text-align: right;">XX年X月X日 <span class="translation">(Date - right aligned)</span></div>',
        keywords: [
            { zh: '问候缩进', en: 'Greeting indented' },
            { zh: '落款靠右', en: 'Sign-off right aligned' }
        ]
    },
    {
        id: 'speech',
        enTitle: 'Speech',
        zhTitle: '演讲稿',
        description: 'A persuasive address. Opening greetings and closing thanks must be properly indented.',
        structure: '尊敬的听众们：\n\n　　大家好！ <span class="translation">(Hello everyone! - indented)</span>\n\n　　今天我演讲的题目是... <span class="translation">(Body paragraph - indented)</span>\n\n　　谢谢大家！ <span class="translation">(Thank you all! - indented)</span>',
        keywords: [
            { zh: '大家好缩进', en: '"Hello everyone" indented' },
            { zh: '谢谢大家缩进', en: '"Thank you" indented' }
        ]
    },
    {
        id: 'report',
        enTitle: 'Report',
        zhTitle: '报告',
        description: 'A formal document. The author\'s name and date are aligned to the right.',
        structure: '标题：\n\n　　正文内容... <span class="translation">(Body paragraph - indented)</span>\n\n<div style="text-align: right;">大卫 / 名字 <span class="translation">(Name - right aligned)</span></div>\n<div style="text-align: right;">日期 <span class="translation">(Date - right aligned)</span></div>',
        keywords: [
            { zh: '段落缩进', en: 'Paragraphs indented' },
            { zh: '落款靠右', en: 'Sign-off right aligned' }
        ]
    },
    {
        id: 'proposal',
        enTitle: 'Proposal / Initiative',
        zhTitle: '倡议书',
        description: 'A call to action. Situation, initiative, and appeals are indented; organizers are right aligned.',
        structure: '<div style="text-align: center; font-weight: bold;">倡议书 <span class="translation">(Title)</span></div>\n\n大家：\n\n　　现状说明... <span class="translation">(Current situation - indented)</span>\n\n　　倡议内容... <span class="translation">(Initiative - indented)</span>\n\n　　呼吁大家行动起来... <span class="translation">(Call to action - indented)</span>\n\n<div style="text-align: right;">小组 / 发起人名字 <span class="translation">(Group/Name - right aligned)</span></div>\n<div style="text-align: right;">日期 <span class="translation">(Date - right aligned)</span></div>',
        keywords: [
            { zh: '现状与倡议缩进', en: 'Situation & initiative indented' },
            { zh: '落款靠右', en: 'Sign-off right aligned' }
        ]
    },
    {
        id: 'poster',
        enTitle: 'Poster',
        zhTitle: '海报',
        description: 'Event promotion. Crucial details like time, location, and fees must be indented.',
        structure: '<div style="text-align: center; font-size: 1.5em; font-weight: bold;">活动主题 <span class="translation">(Title)</span></div>\n\n　　正文介绍... <span class="translation">(Intro - indented)</span>\n\n　　时间: ... <span class="translation">(Time - indented)</span>\n　　地点: ... <span class="translation">(Location - indented)</span>\n　　门票 / 费用: ... <span class="translation">(Ticket/Fee - indented)</span>\n　　报名: ... <span class="translation">(Registration - indented)</span>\n　　联络人/电话: ... <span class="translation">(Contact/Phone - indented)</span>',
        keywords: [
            { zh: '活动细节缩进', en: 'Event details indented' }
        ]
    },
    {
        id: 'note',
        enTitle: 'Note',
        zhTitle: '便条',
        description: 'A brief, informal message. Name and date aligned to the right.',
        structure: '收条人：\n\n　　正文内容... <span class="translation">(Body paragraph - indented)</span>\n\n<div style="text-align: right;">王大 / 名字 <span class="translation">(Name - right aligned)</span></div>\n<div style="text-align: right;">日期 <span class="translation">(Date - right aligned)</span></div>',
        keywords: [
            { zh: '正文缩进', en: 'Body indented' },
            { zh: '落款靠右', en: 'Sign-off right aligned' }
        ]
    },
    {
        id: 'article',
        enTitle: 'Magazine / Newspaper Article',
        zhTitle: '杂志，报纸文章',
        description: 'A published piece. The title, author, and date are all centered at the top.',
        structure: '<div style="text-align: center; font-size: 1.2em; font-weight: bold;">题目 <span class="translation">(Title - centered)</span></div>\n<div style="text-align: center;">作者 <span class="translation">(Author - centered)</span></div>\n<div style="text-align: center;">日期 <span class="translation">(Date - centered)</span></div>\n\n　　正文段落... <span class="translation">(Body paragraph - indented)</span>',
        keywords: [
            { zh: '标题块居中', en: 'Title block centered' },
            { zh: '段落缩进', en: 'Paragraphs indented' }
        ]
    },
    {
        id: 'interview',
        enTitle: 'Interview Report',
        zhTitle: '采访报告',
        description: 'Transcript of an interview. Q&A and summaries are indented; interviewer info is right aligned.',
        structure: '<div style="text-align: center; font-weight: bold;">采访题目 <span class="translation">(Title)</span></div>\n\n　　问与答... <span class="translation">(Q&A - indented)</span>\n\n　　总结... <span class="translation">(Summary - indented)</span>\n\n<div style="text-align: right;">姓名 <span class="translation">(Name - right aligned)</span></div>\n<div style="text-align: right;">日期 <span class="translation">(Date - right aligned)</span></div>',
        keywords: [
            { zh: '问答缩进', en: 'Q&A indented' },
            { zh: '落款靠右', en: 'Sign-off right aligned' }
        ]
    },
    {
        id: 'activity_guide',
        enTitle: 'Activity Guide',
        zhTitle: '活动指南',
        description: 'Step-by-step instructions. Numbers are left aligned, while the actual content and summary are indented.',
        structure: '<div style="text-align: center; font-weight: bold;">指南题目 <span class="translation">(Title)</span></div>\n\n一、主题一 <span class="translation">(1. Left aligned)</span>\n　　内容... <span class="translation">(Content indented under number)</span>\n\n二、主题二 <span class="translation">(2. Left aligned)</span>\n　　内容... <span class="translation">(Content indented under number)</span>\n\n三、主题三 <span class="translation">(3. Left aligned)</span>\n　　内容... <span class="translation">(Content indented under number)</span>\n\n　　总结... <span class="translation">(Summary - indented)</span>',
        keywords: [
            { zh: '序号靠左', en: 'Numbers left aligned' },
            { zh: '内容缩进', en: 'Content indented' }
        ]
    },
    {
        id: 'brochure',
        enTitle: 'Brochure / Layout',
        zhTitle: '宣传册/排版',
        description: 'Promotional layout. Includes a designated headline block, left-aligned numbers, and indented subtitles.',
        structure: '<div style="border: 2px solid var(--ink-black); padding: 8px; text-align: center; font-weight: bold; background: rgba(0,0,0,0.05);">Headline <span class="translation">(In a designated box/block)</span></div>\n\n一、项目一 <span class="translation">(1. Left aligned)</span>\n　　详情 / 小标题... <span class="translation">(Details / Subtitle - indented)</span>\n\n二、项目二 <span class="translation">(2. Left aligned)</span>\n　　详情 / 小标题... <span class="translation">(Details / Subtitle - indented)</span>\n\n三、项目三 <span class="translation">(3. Left aligned)</span>\n　　详情 / 小标题... <span class="translation">(Details / Subtitle - indented)</span>',
        keywords: [
            { zh: '标题框', en: 'Headline block' },
            { zh: '小标题缩进', en: 'Subtitles indented' }
        ]
    },
    {
        id: 'social_media',
        enTitle: 'Social Media Post',
        zhTitle: '社交媒体发布',
        description: 'Digital post formatting. Date is centered at the top, text is indented, and interaction metrics are centered at the bottom.',
        structure: '<div style="text-align: center; color: var(--ink-light); font-size: 0.9em; margin-bottom: 8px;">日期 / X年X月X日 <span class="translation">(Date - centered at top)</span></div>\n　　文本内容... <span class="translation">(Text content - indented rows)</span>\n　　更多文本... <span class="translation">(More text - indented rows)</span>\n\n#话题，@某人，链接 <span class="translation">(Hashtags, mentions, links - left aligned)</span>\n\n<div style="text-align: center; border-top: 1px dashed var(--border-color); padding-top: 10px; margin-top: 10px; font-size: 0.95em;">👍 点赞 (12) &nbsp;&nbsp;&nbsp; 💬 评论 (3) &nbsp;&nbsp;&nbsp; ↪️ 分享 / 转发 <span class="translation">(Likes, Comments, Shares - centered at bottom)</span></div>',
        keywords: [
            { zh: '日期居中', en: 'Date centered top' },
            { zh: '互动居中', en: 'Interactions centered bottom' }
        ]
    }
];

        const searchInput = document.getElementById('searchInput');
        const navList = document.getElementById('navList');
        const contentBody = document.getElementById('contentBody');
        const displayEnTitle = document.getElementById('displayEnTitle');
        const displayZhTitle = document.getElementById('displayZhTitle');
        const displayDesc = document.getElementById('displayDesc');
        const displayStructure = document.getElementById('displayStructure');
        const displayKeywords = document.getElementById('displayKeywords');

        function renderList(filter = '') {
            navList.innerHTML = '';
            const lowerFilter = filter.toLowerCase();
            
            textTypesData.forEach((item, index) => {
                if (item.enTitle.toLowerCase().includes(lowerFilter) || 
                    item.zhTitle.includes(lowerFilter)) {
                    
                    const li = document.createElement('li');
                    li.className = 'nav-item';
                    li.innerHTML = `
                        <span class="en-title">${item.enTitle}</span>
                        <span class="zh-title">${item.zhTitle}</span>
                    `;
                    
                    li.addEventListener('click', () => {
                        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
                        li.classList.add('active');
                        loadContent(item);
                    });

                    navList.appendChild(li);

                    // Auto-load first item on initial render
                    if (index === 0 && filter === '') {
                        li.click();
                    }
                }
            });
        }

        function loadContent(data) {
            contentBody.style.display = 'flex';
            displayEnTitle.textContent = data.enTitle;
            displayZhTitle.textContent = data.zhTitle;
            displayDesc.textContent = data.description;
            
            displayStructure.innerHTML = data.structure
                .split('\n')
                .map(line => `<div class="paper-line">${line === '' ? '&nbsp;' : line}</div>`)
                .join('');
            
            displayKeywords.innerHTML = data.keywords.map(kw => `
                <div class="keyword-tag">
                    <span>${kw.zh}</span>
                    <span class="keyword-translation">${kw.en}</span>
                </div>
            `).join('');
        }

        searchInput.addEventListener('input', (e) => {
            renderList(e.target.value);
        });

        // Initialize
        renderList();
    </script>
</body>
</html>
