<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chinese Text Types Reference</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f4f1eb;
            --paper-color: #fffdf8;
            --ink-black: #1a1a1a;
            --ink-light: #4a4a4a;
            --vermilion: #c23a22;
            --border-color: #d1cbb8;
            --line-height: 36px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Playfair Display', serif;
            background-color: var(--bg-color);
            color: var(--ink-black);
            height: 100vh;
            display: flex;
            overflow: hidden;
            background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100' height='100' filter='url(%23noise)' opacity='0.05'/%3E%3C/svg%3E");
        }

        /* Sidebar Layout */
        .sidebar {
            width: 350px;
            background-color: var(--bg-color);
            border-right: 2px solid var(--ink-black);
            display: flex;
            flex-direction: column;
            z-index: 10;
            box-shadow: 5px 0 15px rgba(0,0,0,0.03);
        }

        .header {
            padding: 2rem;
            border-bottom: 2px solid var(--ink-black);
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
        }

        .header p {
            font-family: 'Noto Serif SC', serif;
            font-size: 1.2rem;
            color: var(--vermilion);
        }

        .search-container {
            padding: 1.5rem;
            border-bottom: 1px solid var(--border-color);
        }

        .search-box {
            width: 100%;
            padding: 0.75rem 1rem;
            font-family: inherit;
            font-size: 1rem;
            background: transparent;
            border: 1px solid var(--ink-light);
            border-radius: 0;
            color: var(--ink-black);
            transition: all 0.3s ease;
        }

        .search-box:focus {
            outline: none;
            border-color: var(--vermilion);
            box-shadow: 4px 4px 0px var(--vermilion);
        }

        .nav-list {
            flex-grow: 1;
            overflow-y: auto;
            list-style: none;
        }

        .nav-item {
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .nav-item:hover {
            background-color: rgba(194, 58, 34, 0.05);
            padding-left: 2rem;
        }

        .nav-item.active {
            background-color: var(--ink-black);
            color: var(--bg-color);
            border-color: var(--ink-black);
        }

        .nav-item.active .zh-title {
            color: var(--bg-color);
            opacity: 0.8;
        }

        .en-title {
            font-weight: 700;
            font-size: 1.1rem;
        }

        .zh-title {
            font-family: 'Noto Serif SC', serif;
            font-size: 0.9rem;
            color: var(--ink-light);
        }

        /* Main Content Area */
        .main-content {
            flex-grow: 1;
            padding: 3rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .manuscript-container {
            width: 100%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .content-header {
            border-bottom: 4px double var(--ink-black);
            padding-bottom: 1rem;
            margin-bottom: 1rem;
        }

        .content-title {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        .content-zh-title {
            font-family: 'Noto Serif SC', serif;
            color: var(--vermilion);
            font-size: 1.5rem;
        }

        .description {
            font-style: italic;
            color: var(--ink-light);
            line-height: 1.6;
            font-size: 1.1rem;
        }

        .section-label {
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.85rem;
            color: var(--vermilion);
            margin-bottom: 1rem;
            display: inline-block;
            border-bottom: 1px solid var(--vermilion);
            padding-bottom: 0.2rem;
        }

        /* Structure Layout */
        .structure-block {
            background-color: var(--paper-color);
            border: 1px solid var(--border-color);
            padding: 2rem;
            position: relative;
            box-shadow: 8px 8px 0px rgba(0,0,0,0.05);
        }

        .manuscript-paper {
            font-family: 'Noto Serif SC', serif;
            font-size: 1.2rem;
            color: var(--ink-black);
        }

        .paper-line {
            min-height: var(--line-height);
            border-bottom: 1px solid var(--border-color);
            line-height: var(--line-height);
            padding-bottom: 2px;
            word-break: break-word;
        }

        /* Translation Styling */
        .translation {
            color: #888888;
            font-family: 'Playfair Display', serif;
            font-size: 0.85em;
            font-style: italic;
            margin-left: 0.5rem;
            user-select: none; /* Prevents selecting the translation when copying the Chinese text */
        }

        /* Keywords Layout */
        .keywords-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .keyword-tag {
            border: 1px solid var(--ink-black);
            padding: 0.5rem 1rem;
            font-family: 'Noto Serif SC', serif;
            font-size: 1.1rem;
            background: transparent;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .keyword-tag:hover {
            background: var(--ink-black);
            color: var(--bg-color);
        }

        .keyword-translation {
            font-family: 'Playfair Display', serif;
            font-size: 0.9rem;
            opacity: 0.7;
            font-style: italic;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-color);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--ink-light);
        }

    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="header">
            <h1>Text Types</h1>
            <p>写作格式指南</p>
        </div>
        <div class="search-container">
            <input type="text" id="searchInput" class="search-box" placeholder="Search structures (e.g., Email, 报告)...">
        </div>
        <ul class="nav-list" id="navList">
            </ul>
    </aside>

    <main class="main-content">
        <div class="manuscript-container">
            <div class="content-header">
                <h2 class="content-title" id="displayEnTitle">Select a Text Type</h2>
                <h3 class="content-zh-title" id="displayZhTitle">请选择文章类型</h3>
            </div>
            
            <p class="description" id="displayDesc">Use the search bar or the list on the left to explore formatting conventions.</p>

            <div id="contentBody" style="display: none; width: 100%; flex-direction: column; gap: 2rem;">
                <div>
                    <div class="section-label">Structural Layout</div>
                    <div class="structure-block">
                        <div class="manuscript-paper" id="displayStructure"></div>
                    </div>
                </div>

                <div>
                    <div class="section-label">Essential Keywords & Phrases</div>
                    <div class="keywords-grid" id="displayKeywords">
                        </div>
                </div>
            </div>
        </div>
    </main>

        const searchInput = document.getElementById('searchInput');
        const navList = document.getElementById('navList');
        const contentBody = document.getElementById('contentBody');
        const displayEnTitle = document.getElementById('displayEnTitle');
        const displayZhTitle = document.getElementById('displayZhTitle');
        const displayDesc = document.getElementById('displayDesc');
        const displayStructure = document.getElementById('displayStructure');
        const displayKeywords = document.getElementById('displayKeywords');

        function renderList(filter = '') {
            navList.innerHTML = '';
            const lowerFilter = filter.toLowerCase();
            
            textTypesData.forEach((item, index) => {
                if (item.enTitle.toLowerCase().includes(lowerFilter) || 
                    item.zhTitle.includes(lowerFilter)) {
                    
                    const li = document.createElement('li');
                    li.className = 'nav-item';
                    li.innerHTML = `
                        <span class="en-title">${item.enTitle}</span>
                        <span class="zh-title">${item.zhTitle}</span>
                    `;
                    
                    li.addEventListener('click', () => {
                        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
                        li.classList.add('active');
                        loadContent(item);
                    });

                    navList.appendChild(li);

                    // Auto-load first item on initial render
                    if (index === 0 && filter === '') {
                        li.click();
                    }
                }
            });
        }

        function loadContent(data) {
            contentBody.style.display = 'flex';
            displayEnTitle.textContent = data.enTitle;
            displayZhTitle.textContent = data.zhTitle;
            displayDesc.textContent = data.description;
            
            // Split by newline and render each line as its own div with a border-bottom rule,
            // so paper lines never drift out of alignment regardless of text wrapping.
            displayStructure.innerHTML = data.structure
                .split('\n')
                .map(line => `<div class="paper-line">${line === '' ? '&nbsp;' : line}</div>`)
                .join('');
            
            displayKeywords.innerHTML = data.keywords.map(kw => `
                <div class="keyword-tag">
                    <span>${kw.zh}</span>
                    <span class="keyword-translation">${kw.en}</span>
                </div>
            `).join('');
        }

        searchInput.addEventListener('input', (e) => {
            renderList(e.target.value);
        });

        // Initialize
        renderList();
    </script>
</body>
</html>
